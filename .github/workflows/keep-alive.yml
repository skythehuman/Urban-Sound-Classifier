name: Keep Streamlit Alive

# ── 실행 조건 ──────────────────────────────────────
on:
  schedule:
    # 4시간마다 실행 (UTC 기준)
    # 한국 시간으로는 01:00, 05:00, 09:00, 13:00, 17:00, 21:00
    - cron: '0 */4 * * *'
  workflow_dispatch:   # GitHub UI에서 수동 실행도 가능

# ── 작업 정의 ──────────────────────────────────────
jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Streamlit App
        run: |
          # 앱 URL에 HTTP 요청을 보내 슬립 방지
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            https://urban-sound-classifier.streamlit.app)
          echo "Status: $STATUS at $(date -u '+%Y-%m-%d %H:%M UTC')"

          # 응답 코드 확인
          if [ "$STATUS" -eq 200 ]; then
            echo "App is awake"
          else
            echo "App returned status $STATUS (may be waking up)"
          fi
